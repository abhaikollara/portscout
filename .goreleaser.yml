version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

brews:
  - repository:
      owner: abhaikollara
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/abhaikollara/portscout"
    description: "TUI tool to identify and kill processes occupying local ports"
    license: "MIT"
    test: |
      assert_match version.to_s, shell_output("#{bin}/portscout --version")

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
